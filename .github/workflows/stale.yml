# This workflow warns and then closes issues and PRs that have had no activity for a specified amount of time.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/actions/stale
name: Mark stale issues and pull requests

on:
  schedule:
  - cron: '17 12 * * *'

jobs:
  stale:

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v9
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        days-before-stale: 60
        days-before-close: 14
        stale-issue-message: >
          This issue has been inactive for 60 days. It will be closed in 14 days unless there is new activity.
          If it's still relevant, please leave a comment or add more detail (logs, repro steps, version, platform) so we can pick it back up.
        stale-pr-message: >
          This pull request has been inactive for 60 days. It will be closed in 14 days unless there is new activity.
          If you'd like to keep it open, please rebase on the latest base branch and leave a comment.
        close-issue-message: >
          Closing this for lack of activity. Feel free to reopen with an update if it's still relevant.
        close-pr-message: >
          Closing this PR for lack of activity. Feel free to reopen if you want to continue working on it.
        stale-issue-label: 'stale'
        stale-pr-label: 'stale'
        exempt-issue-labels: 'pinned,security,bug,roadmap'
        exempt-pr-labels: 'pinned,security,work-in-progress'
        operations-per-run: 60
