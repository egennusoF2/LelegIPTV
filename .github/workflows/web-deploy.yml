name: web-deploy

# Builds the static web app + Pages Function (/__stream), deploys to Cloudflare Pages.
# Setup: docs/deploy-web.md

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "functions/**"
      - "astro.config.mjs"
      - "wrangler.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

concurrency:
  group: web-cloudflare
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build web app
        run: pnpm build:pages

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=leleg-iptv --branch=main

      - name: Skip deploy notice
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Cloudflare secrets not set — build OK, deploy skipped. See docs/deploy-web.md"
